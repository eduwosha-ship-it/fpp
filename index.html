<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIRCO App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #28a745; color: white; padding: 10px 20px; }
        h1 { margin: 0; }
        nav { margin: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #28a745; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>BIRCO App</h1>
        <nav>
            <a href="#recipes">Recipes</a>
            <a href="#search">Search</a>
            <a href="#favorites">Favorites</a>
            <a href="#shop">Shop</a>
        </nav>
    </header>
    <div class="content">
        <section id="recipes">
            <h2>Recipes</h2>
            <ul>
                <li>Recipe 1</li>
                <li>Recipe 2</li>
                <li>Recipe 3</li>
            </ul>
        </section>
        <section id="search">
            <h2>Search</h2>
            <input type="text" placeholder="Search for a recipe...">
            <button>Search</button>
        </section>
        <section id="favorites">
            <h2>Favorites</h2>
            <ul>
                <li>Favorite Recipe 1</li>
                <li>Favorite Recipe 2</li>
            </ul>
        </section>
        <section id="shop">
            <h2>Shop</h2>
            <ul>
                <li>Product 1</li>
                <li>Product 2</li>
            </ul>
        </section>
    </div>
</body>
</html>
